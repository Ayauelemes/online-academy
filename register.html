<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тіркелу | Online Academy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page-bg">
    <div class="login-page">
        <a href="index.html" class="back-home">&larr; Басты бетке қайту</a>

        <div class="login-container">
            <div class="login-box">
                <h2 class="highlight-title">Тіркелу</h2>
                <p class="subtitle">Жаңа аккаунт ашып, білім алуды бастаңыз</p>
                
                <form id="registerForm">
                    <div class="input-group">
                        <label for="fullName">Толық атыңыз</label>
                        <input type="text" id="fullName" placeholder="Аты-жөніңіз" required>
                    </div>

                    <div class="input-group">
                        <label for="regEmail">Email</label>
                        <input type="email" id="regEmail" placeholder="example@mail.com" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="regPassword">Құпия сөз</label>
                        <input type="password" id="regPassword" placeholder="********" required>
                    </div>

                    <div class="input-group">
                        <label for="confirmPassword">Құпия сөзді растау</label>
                        <input type="password" id="confirmPassword" placeholder="********" required>
                    </div>

                    <button type="submit" class="login-submit-btn">Тіркелу</button>
                </form>
                
                <p class="switch-text">Аккаунтыңыз бар ма? <a href="login.html" class="tirkelu">Кіруге қайту</a></p>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>

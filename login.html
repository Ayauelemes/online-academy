<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Жүйеге кіру | Online Academy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page-bg">
    <div class="login-page">
        <a href="index.html" class="back-home">&larr; Басты бетке қайту</a>

        <div class="login-container">
            <div class="login-box">
                <h2 class="highlight-title">Жүйеге кіру</h2>
                <p class="subtitle">Аккаунтыңызға кіріп, оқуды жалғастырыңыз</p>
                
                <form id="loginForm">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="example@mail.com" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Құпия сөз</label>
                        <input type="password" id="password" placeholder="********" required>
                    </div>

                    <button type="submit" class="login-submit-btn">Кіру</button>
                </form>

                <p class="switch-text">Аккаунтыңыз жоқ па? <a href="register.html" class="tirkelu">Тіркелу</a></p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
